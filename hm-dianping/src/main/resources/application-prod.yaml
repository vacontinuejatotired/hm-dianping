server:
  port: 8082
  tomcat:
    max-connections: 1000
    accept-count: 1000
    threads:
      max: 500

management:
  health:
    rabbit:
      enabled: false

spring:
  config:
    activate:
      on-profile: prod
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/heima?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  data:
    redis:
      host: 192.168.49.130
      port: 6379
      password: 281458
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          time-between-eviction-runs: 10s
  rabbitmq:
    host: 192.168.49.130
    password: 123321
    username: qyh
    virtual-host: /
  sql:
    init:
      mode: never

mybatis-plus:
  type-aliases-package: com.hmdp.entity

logging:
  level:
    com.hmdp: debug
    org.springframework.data.redis: WARN

debug: false

app:
  cookie:
    same-site: None
    secure: true
  oss:
    region: cn-beijing
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket: ntwitm1
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
